<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COZY.EXE ☕</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-frame">
    <div class="outer-glass">
      <div class="container">

        <h1>☕ COZY.EXE</h1>
        <p id="welcomeMsg"></p>

        <div class="input-area">
          <input id="taskInput" placeholder="what's brewing?">
          <input id="deadlineInput" type="date">
          <button onclick="addTask()">[ ADD TASK ]</button>
        </div>

        <div class="task-section">
          <ul id="taskList"></ul>
        </div>

        <div class="button-row">
          <button class="history-btn" onclick="toggleHistory()">▼ HISTORY</button>
          <button class="logout-btn"  onclick="logout()">⏻ LOGOUT</button>
        </div>

        <div id="historySection" class="history">
          <p class="history-title">Finished Brews</p>
          <div id="historyList"></div>
        </div>

      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
